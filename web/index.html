<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Briefcase Descent</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
      #gl { display: block; width: 100vw; height: 100vh; touch-action: none; }

      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font: 600 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #eaf2ff; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
        -webkit-user-select: none; user-select: none;
      }
      #stats { position: absolute; top: 12px; left: 14px; opacity: 0.92; white-space: pre; }
      #fps   { position: absolute; top: 12px; right: 14px; opacity: 0.45; white-space: pre; text-align: right; }

      #center {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center; gap: 12px;
      }
      #center.hidden { display: none; }
      #title { font-size: clamp(28px, 6vw, 46px); letter-spacing: 3px; font-weight: 700; }
      #sub   { font-size: 15px; opacity: 0.75; max-width: 30ch; }
      #hint  { font-size: 14px; opacity: 0.85; margin-top: 6px; }
      .key {
        display: inline-block; padding: 1px 7px; margin: 0 1px;
        border: 1px solid rgba(255, 255, 255, 0.35); border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <div id="hud">
      <div id="stats"></div>
      <div id="fps"></div>
      <div id="center">
        <div id="title">BRIEFCASE DESCENT</div>
        <div id="sub"></div>
        <div id="hint"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
